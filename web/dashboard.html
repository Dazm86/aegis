<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aegis — Control Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E14;
    --panel:#12161F;
    --line:#232937;
    --text:#E8E6DE;
    --muted:#8890A0;
    --amber:#E8A33D;
    --green:#3FA796;
    --red:#C7524B;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--text);
    font-family:'Vazirmatn',system-ui,sans-serif;
    line-height:1.6;
    padding-bottom:100px;
  }
  body.frozen{
    opacity:0.6;
    pointer-events:none;
  }
  body.frozen::before{
    content:'🧊 سیستم متوقف شده است';
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.9);
    padding:40px;
    border-radius:10px;
    z-index:9999;
    font-size:24px;
    font-weight:700;
    color:var(--amber);
  }

  header{
    padding:20px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    background:var(--panel);
    z-index:100;
  }
  .title{
    font-family:'JetBrains Mono',monospace;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.08em;
  }
  .title span{color:var(--amber);}
  .controls{
    display:flex;
    gap:10px;
  }
  .btn{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
    font-size:13px;
    font-family:inherit;
    transition:0.2s;
  }
  .btn:hover{opacity:0.85;}
  .btn.freeze{background:var(--red);color:var(--ink);}
  .btn.primary{background:var(--amber);color:var(--ink);}
  .btn.secondary{background:var(--line);color:var(--text);}

  main{max-width:1200px;margin:0 auto;padding:0 16px;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  @media(max-width:900px){.grid{grid-template-columns:1fr;}}

  nav{
    display:flex;
    gap:10px;
    margin:20px 0;
    border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  nav button{
    padding:10px 16px;
    background:transparent;
    border:none;
    color:var(--muted);
    cursor:pointer;
    border-bottom:2px solid transparent;
    font-size:14px;
  }
  nav button.active{
    color:var(--amber);
    border-color:var(--amber);
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px;
  }

  h2{
    margin:0 0 16px;
    font-size:16px;
    font-weight:700;
  }

  .chat-box{
    display:flex;
    flex-direction:column;
    height:500px;
  }
  .messages{
    flex:1;
    overflow-y:auto;
    margin-bottom:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .message{
    padding:10px;
    border-radius:6px;
    max-width:80%;
    word-wrap:break-word;
  }
  .message.user{
    background:rgba(232,163,61,0.15);
    color:var(--amber);
    align-self:flex-end;
    text-align:right;
  }
  .message.deputy{
    background:rgba(63,167,150,0.15);
    color:var(--green);
    align-self:flex-start;
  }
  .chat-input{
    display:flex;
    gap:8px;
  }
  .chat-input input{
    flex:1;
    background:var(--ink);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 12px;
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
  }
  .chat-input button{
    padding:10px 16px;
    background:var(--green);
    color:var(--ink);
    border:none;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
    font-size:13px;
  }

  .api-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .api-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:6px;
    font-size:13px;
  }
  .api-item button{
    padding:4px 8px;
    background:var(--red);
    color:var(--ink);
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
  }

  .form-row{
    margin-bottom:12px;
  }
  .form-row label{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .form-row input{
    width:100%;
    background:var(--ink);
    border:1px solid var(--line);
    color:var(--text);
    padding:8px 10px;
    border-radius:6px;
    font-size:13px;
  }

  .card{
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:6px;
    padding:12px;
    margin-bottom:10px;
  }
  .card-title{
    font-weight:700;
    margin:0 0 6px;
  }
  .card-meta{
    font-size:12px;
    color:var(--muted);
  }
  .badge{
    display:inline-block;
    padding:2px 8px;
    border-radius:4px;
    font-size:11px;
    margin-right:6px;
  }
  .badge.pending{background:rgba(232,163,61,0.2);color:var(--amber);}
  .badge.approved{background:rgba(63,167,150,0.2);color:var(--green);}
  .badge.rejected{background:rgba(199,82,75,0.2);color:var(--red);}

  .code-view{
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:4px;
    padding:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    overflow-x:auto;
    max-height:150px;
    overflow-y:auto;
    margin:8px 0;
  }

  .actions{
    display:flex;
    gap:6px;
    margin-top:8px;
  }
  .actions button{
    flex:1;
    padding:6px;
    border:none;
    border-radius:4px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .actions .approve{background:var(--green);color:var(--ink);}
  .actions .reject{background:var(--red);color:var(--ink);}

  .loading{
    color:var(--muted);
    font-size:13px;
  }

  .mission-list, .queue-list{
    max-height:600px;
    overflow-y:auto;
  }

  .tab-content{
    display:none;
  }
  .tab-content.active{
    display:block;
  }
</style>
</head>
<body>

<header>
  <div class="title">AEGIS <span>»</span></div>
  <div class="controls">
    <button class="btn secondary" id="status-indicator">🟢 فعال</button>
    <button class="btn primary" onclick="triggerHeartbeat()">⚡ اجرای فوری</button>
    <button class="btn freeze" id="freeze-btn" onclick="toggleFreeze()">توقف سیستم</button>
  </div>
</header>

<main>

  <nav>
    <button class="nav-btn active" onclick="showTab('deputy')">معاون</button>
    <button class="nav-btn" onclick="showTab('apis')">APIs</button>
    <button class="nav-btn" onclick="showTab('review')">بررسی کدها</button>
    <button class="nav-btn" onclick="showTab('docket')">پرونده‌ها</button>
  </nav>

  <!-- Deputy Chat -->
  <div id="deputy-tab" class="tab-content active">
    <div class="grid">
      <div class="panel">
        <h2>💬 صحبت با معاون</h2>
        <div class="chat-box">
          <div class="messages" id="chat-messages"></div>
          <div class="chat-input">
            <input id="chat-input" type="text" placeholder="ایده‌ی خود را بیان کنید..." onkeypress="if(event.key==='Enter')sendMessage()" />
            <button onclick="sendMessage()">فرستادن</button>
          </div>
        </div>
      </div>
      <div class="panel">
        <h2>✅ تأیید ایده</h2>
        <div id="mission-confirmation">
          <p class="loading">منتظر پیشنهاد...</p>
        </div>
        <button class="btn primary" onclick="createMission()" style="width:100%;margin-top:12px;">ایجاد ماموریت</button>
      </div>
    </div>
  </div>

  <!-- APIs Management -->
  <div id="apis-tab" class="tab-content">
    <div class="panel">
      <h2>🔑 مدیریت APIs</h2>
      <div class="form-row">
        <label>نام API (برای شناسایی)</label>
        <input id="api-name" type="text" placeholder="OpenAI, Claude, Custom..." />
      </div>
      <div class="form-row">
        <label>Base URL</label>
        <input id="api-url" type="text" placeholder="https://api.example.com" />
      </div>
      <div class="form-row">
        <label>API Key</label>
        <input id="api-key" type="password" placeholder="your-api-key-here" />
      </div>
      <button class="btn primary" onclick="addAPI()" style="width:100%;">اضافه کردن API</button>
      <h3 style="margin-top:20px;">APIs فعال:</h3>
      <div class="api-list" id="api-list"></div>
    </div>
  </div>

  <!-- Review Queue -->
  <div id="review-tab" class="tab-content">
    <div class="panel">
      <h2>📋 صف بررسی کدها</h2>
      <div class="queue-list" id="queue-list"><p class="loading">درحال بارگیری...</p></div>
    </div>
  </div>

  <!-- Docket (Missions) -->
  <div id="docket-tab" class="tab-content">
    <div class="grid">
      <div class="panel">
        <h2>📑 پرونده‌های فعال</h2>
        <div class="mission-list" id="missions-list"><p class="loading">درحال بارگیری...</p></div>
      </div>
      <div class="panel">
        <h2>🎯 تصمیمات شورا</h2>
        <div id="decisions-list" style="max-height:600px;overflow-y:auto;"><p class="loading">درحال بارگیری...</p></div>
      </div>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://xufbpsdtzrjnwvkpalbu.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1ZmJwc2R0enJqbnd2a3BhbGJ1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzM4NzY3MiwiZXhwIjoyMDk4OTYzNjcyfQ.QJMDHDXPulUqtDPIKoTAObsbE4x2OoeLkdvv1j_vE0A";
const EDGE_FUNCTION_URL = "https://xufbpsdtzrjnwvkpalbu.supabase.co/functions/v1/chat-deputy";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let systemFrozen = false;
let storedAPIs = [];
let currentMissionDraft = null;
let authToken = null;

// ---- Auth ----
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    const { data, error } = await sb.auth.signInAnonymously();
    if (error) {
      console.error('Anonymous sign-in failed:', error.message);
      authToken = '';
    } else {
      authToken = data.session?.access_token || '';
      currentUser = data.user;
    }
  } else {
    authToken = session.access_token;
    currentUser = session.user;
  }
  loadAPIs();
  loadQueue();
  loadMissions();
}

// ---- Tab Navigation ----
function showTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabName + '-tab').classList.add('active');
  event.target.classList.add('active');
}

// ---- Freeze System ----
function toggleFreeze() {
  systemFrozen = !systemFrozen;
  document.body.classList.toggle('frozen');
  const btn = document.getElementById('freeze-btn');
  btn.textContent = systemFrozen ? '🔓 باز کردن سیستم' : '🧊 توقف سیستم';
  const indicator = document.getElementById('status-indicator');
  indicator.textContent = systemFrozen ? '🔴 متوقف' : '🟢 فعال';
}

// ---- Deputy Chat ----
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  
  input.value = '';
  
  const messagesDiv = document.getElementById('chat-messages');
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.textContent = message;
  messagesDiv.appendChild(userMsg);
  
  try {
    const response = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ action: 'chat_deputy', message })
    });
    
    if (!response.ok) throw new Error('رابط‌پیام دستیاب نیست');
    
    const data = await response.json();
    currentMissionDraft = data;
    
    const deputyMsg = document.createElement('div');
    deputyMsg.className = 'message deputy';
    deputyMsg.innerHTML = `<strong>${data.suggestedTitle}</strong><br/>${data.understanding}`;
    messagesDiv.appendChild(deputyMsg);
    
    if (data.needsClarification) {
      const clarifyMsg = document.createElement('div');
      clarifyMsg.className = 'message deputy';
      clarifyMsg.textContent = `❓ ${data.clarifyingQuestion}`;
      messagesDiv.appendChild(clarifyMsg);
    }
    
    // Update confirmation panel
    const confirmDiv = document.getElementById('mission-confirmation');
    confirmDiv.innerHTML = `
      <div class="card">
        <div class="card-title">${data.suggestedTitle}</div>
        <div>${data.suggestedDescription}</div>
      </div>
    `;
    
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  } catch (err) {
    const errMsg = document.createElement('div');
    errMsg.className = 'message deputy';
    errMsg.textContent = '❌ خطا: ' + err.message;
    messagesDiv.appendChild(errMsg);
  }
}

async function createMission() {
  if (!currentMissionDraft) {
    alert('ابتدا با معاون صحبت کنید');
    return;
  }
  
  const { error } = await sb.from('missions').insert({
    title: currentMissionDraft.suggestedTitle,
    description: currentMissionDraft.suggestedDescription
  });
  
  if (error) {
    alert('خطا: ' + error.message);
  } else {
    alert('✅ ماموریت ایجاد شد');
    currentMissionDraft = null;
    document.getElementById('mission-confirmation').innerHTML = '<p class=\"loading\">منتظر پیشنهاد...</p>';
    loadMissions();
  }
}

// ---- APIs Management ----
function addAPI() {
  const name = document.getElementById('api-name').value.trim();
  const url = document.getElementById('api-url').value.trim();
  const key = document.getElementById('api-key').value.trim();
  
  if (!name || !url || !key) {
    alert('همه فیلدها الزامی هستند');
    return;
  }
  
  storedAPIs.push({ name, url, key });
  localStorage.setItem('aegis_apis', JSON.stringify(storedAPIs));
  
  document.getElementById('api-name').value = '';
  document.getElementById('api-url').value = '';
  document.getElementById('api-key').value = '';
  
  renderAPIs();
  alert('✅ API اضافه شد');
}

function removeAPI(index) {
  storedAPIs.splice(index, 1);
  localStorage.setItem('aegis_apis', JSON.stringify(storedAPIs));
  renderAPIs();
}

function loadAPIs() {
  const stored = localStorage.getItem('aegis_apis');
  storedAPIs = stored ? JSON.parse(stored) : [];
  renderAPIs();
}

function renderAPIs() {
  const list = document.getElementById('api-list');
  list.innerHTML = storedAPIs.map((api, i) => `
    <div class="api-item">
      <div>
        <strong>${api.name}</strong><br/>
        <span style="font-size:11px;color:var(--muted);">${api.url}</span>
      </div>
      <button onclick="removeAPI(${i})">حذف</button>
    </div>
  `).join('') || '<p class="loading">هیچ API اضافه نشده</p>';
}

// ---- Review Queue ----
async function loadQueue() {
  const { data, error } = await sb
    .from('content_queue')
    .select('*')
    .order('created_at', { ascending: false });
  
  const list = document.getElementById('queue-list');
  if (error || !data?.length) {
    list.innerHTML = '<p class="loading">صف خالی است</p>';
    return;
  }
  
  list.innerHTML = data.map(item => {
    let parsed = {};
    try { parsed = JSON.parse(item.content); } catch {}
    
    return `
      <div class="card">
        <div class="card-title">${parsed.missionTitle || item.content_type}</div>
        <div class="card-meta">
          <span class="badge ${item.status}">${item.status}</span>
          اطمینان: ${parsed.confidence || '؟'}
        </div>
        <p>${parsed.explanation || ''}</p>
        ${item.status === 'pending_review' ? `
          <div class="code-view">${escapeHtml(parsed.code || '')}</div>
          <div class="actions">
            <button class="approve" onclick="approveCode(${item.id})">تأیید ✓</button>
            <button class="reject" onclick="rejectCode(${item.id})">رد ✗</button>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

async function approveCode(id) {
  const { error } = await sb
    .from('content_queue')
    .update({ status: 'approved', reviewed_at: new Date().toISOString() })
    .eq('id', id);
  
  if (!error) {
    alert('✅ تأیید شد');
    loadQueue();
  }
}

async function rejectCode(id) {
  const { error } = await sb
    .from('content_queue')
    .update({ status: 'rejected', reviewed_at: new Date().toISOString() })
    .eq('id', id);
  
  if (!error) {
    alert('✅ رد شد');
    loadQueue();
  }
}

// ---- Mission actions ----
async function deleteMission(id) {
  if (!confirm('مطمئنی می‌خوای این ماموریت رو کامل حذف کنی؟')) return;
  const { error } = await sb.from('missions').delete().eq('id', id);
  if (error) { alert('خطا: ' + error.message); return; }
  loadMissions();
}

async function suspendMission(id) {
  const { error } = await sb.from('missions').update({ status: 'suspended' }).eq('id', id);
  if (error) { alert('خطا: ' + error.message); return; }
  loadMissions();
}

async function resumeMission(id) {
  const { error } = await sb.from('missions').update({ status: 'pending' }).eq('id', id);
  if (error) { alert('خطا: ' + error.message); return; }
  loadMissions();
}

async function triggerHeartbeat() {
  if (!confirm('اجرای فوری شورا رو شروع کنم؟')) return;
  try {
    const response = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ action: 'trigger_heartbeat' })
    });
    const data = await response.json();
    if (data.success) {
      alert('✅ اجرا شروع شد، تا ۱ دقیقه دیگه نتیجه رو رفرش کن ببین');
    } else {
      alert('❌ خطا: ' + (data.error || 'نامشخص'));
    }
  } catch (err) {
    alert('❌ خطا: ' + err.message);
  }
}

// ---- Missions & Docket ----
async function loadMissions() {
  const { data: missions, error: mErr } = await sb.from('missions').select('*').order('created_at', { ascending: false });
  const { data: decisions, error: dErr } = await sb.from('decisions').select('*');
  const { data: verdicts } = await sb.from('council_decisions').select('*');
  
  const mList = document.getElementById('missions-list');
  if (!missions?.length) {
    mList.innerHTML = '<p class="loading">هیچ ماموریتی ثبت نشده</p>';
  } else {
    mList.innerHTML = missions.map(m => {
      const dec = decisions?.find(d => d.mission_id === m.id);
      const vList = verdicts?.filter(v => v.mission_id === m.id) || [];
      
      return `
        <div class="card">
          <div class="card-title">${m.title}</div>
          <span class="badge ${m.status}">${m.status}</span>
          ${dec ? `<span class="badge" style="background:rgba(232,163,61,0.2);color:var(--amber);">امتیاز: ${dec.average_score}</span>` : ''}
          <p style="margin-top:6px;font-size:13px;">${m.description}</p>
          ${vList.length ? `<details><summary>نظرات شورا (${vList.length})</summary><div style="margin-top:6px;font-size:12px;color:var(--muted);">${vList.map(v => `${v.role_id}: ${v.response}`).join('<br/>')}</div></details>` : ''}
          <div class="actions" style="margin-top:8px;">
            ${m.status === 'suspended'
              ? `<button class="approve" onclick="resumeMission(${m.id})">فعال‌سازی مجدد</button>`
              : `<button class="reject" onclick="suspendMission(${m.id})">تعلیق</button>`}
            <button class="reject" onclick="deleteMission(${m.id})">حذف</button>
          </div>
        </div>
      `; 

      `;
    }).join('');
  }
  
  const dList = document.getElementById('decisions-list');
  if (!decisions?.length) {
    dList.innerHTML = '<p class="loading">هیچ تصمیمی اتخاذ نشده</p>';
  } else {
    dList.innerHTML = decisions.map(d => `
      <div class="card">
        <div class="card-title">ماموریت #${d.mission_id}</div>
        <span class="badge ${d.approved ? 'approved' : 'rejected'}">${d.approved ? '✅ تأیید' : '❌ رد'}</span>
        <div style="font-size:12px;margin-top:6px;">امتیاز: ${d.average_score} / ${d.threshold}</div>
      </div>
    `).join('');
  }
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
initAuth();
setInterval(() => { loadQueue(); loadMissions(); }, 30000);
</script>
