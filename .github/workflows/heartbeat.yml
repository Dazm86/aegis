name: Aegis Heartbeat

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run heartbeat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: https://api.groq.com/openai/v1
          AI_MODEL: llama-3.3-70b-versatile
          MONTHLY_BUDGET_USD: 5
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run heartbeat

      - name: Commit and push staging changes (if any)
        run: |
          git config user.name "Aegis Bot"
          git config user.email "aegis-bot@users.noreply.github.com"
          git add site-staging/ web-staging/ site/
          if ! git diff --cached --quiet; then
            git commit -m "Deployer: apply approved changes to staging"
            git push
          else
            echo "No staging changes to commit."
          fi
